# Name of the Spring Boot application (used in logs, monitoring, etc.)
spring.application.name=demo

# Port on which the embedded server (Tomcat) will run (default is 8080)
server.port=9090


# JDBC URL to connect to MySQL database
# localhost = database is on your machine
# 3306 = default MySQL port
# blog_app_apis = database name
spring.datasource.url=jdbc:mysql://localhost:3306/blog_app_apis

# Username for the MySQL database
spring.datasource.username=root

# Password for the MySQL database
spring.datasource.password=root

# MySQL JDBC driver class (required for database connectivity)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Hibernate dialect (tells Hibernate how to generate SQL for MySQL 8)
# NOTE: Usually written as spring.jpa.properties.hibernate.dialect
spring.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# Controls how Hibernate handles database schema
# create = drop and recreate tables every time
# update = update schema without losing data (used here)
# validate = only checks schema
# create-drop = create at start, drop at shutdown
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true